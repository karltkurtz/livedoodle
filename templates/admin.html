<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle // Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
      --bg:     #0a0a0a;
    }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    #page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      padding: 44px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.5;
    }

    #wordmark-dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      flex-shrink: 0;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #back {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
    }
    #back:hover { color: #888; }

    h1 {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow: 0 0 18px rgba(255,179,0,0.45), 0 0 54px rgba(255,179,0,0.1);
    }

    .rule {
      height: 1px;
      background: linear-gradient(90deg, rgba(255,179,0,0.25), transparent);
    }

    /* Lock section */
    #lock {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    input[type="password"] {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #222;
      color: #888;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: var(--amber);
      box-shadow: 0 0 8px rgba(255,179,0,0.2);
      color: #bbb;
    }

    #unlock-btn {
      padding: 14px 20px;
      background: var(--bg);
      border: 2px solid var(--amber);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255,179,0,0.3);
      transition: opacity 0.1s;
    }
    #unlock-btn:active { opacity: 0.7; }

    #lock-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--coral);
      min-height: 14px;
    }

    /* Admin panel */
    #panel {
      display: none;
      flex-direction: column;
      gap: 24px;
    }
    #panel.visible { display: flex; }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--amber);
      opacity: 0.6;
      margin-bottom: 10px;
    }

    /* Camera */
    #camera-preview {
      width: 100%;
      aspect-ratio: 4/3;
      background: #030303;
      border: 1px solid #111;
      display: block;
      object-fit: contain;
    }

    #camera-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    #camera-status.online { color: var(--green); }
    #camera-status.offline { color: var(--coral); }

    /* Presence */
    #presence-btns {
      display: flex;
      gap: 12px;
    }

    .presence-btn {
      flex: 1;
      padding: 14px 10px;
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.1s, box-shadow 0.15s;
    }
    .presence-btn:active { opacity: 0.7; }

    #btn-home {
      border: 2px solid var(--green);
      color: var(--green);
      box-shadow: 0 0 10px rgba(57,255,20,0.2);
    }
    #btn-home:hover { box-shadow: 0 0 18px rgba(57,255,20,0.4); }
    #btn-home.active {
      background: rgba(57,255,20,0.08);
      box-shadow: 0 0 20px rgba(57,255,20,0.5);
    }

    #btn-away {
      border: 2px solid var(--amber);
      color: var(--amber);
      box-shadow: 0 0 10px rgba(255,179,0,0.2);
    }
    #btn-away:hover { box-shadow: 0 0 18px rgba(255,179,0,0.4); }
    #btn-away.active {
      background: rgba(255,179,0,0.08);
      box-shadow: 0 0 20px rgba(255,179,0,0.5);
    }

    #presence-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
      min-height: 14px;
      margin-top: 6px;
    }

    /* Display reload */
    #reload-display-btn {
      width: 100%;
      padding: 14px 10px;
      background: var(--bg);
      border: 2px solid var(--teal);
      color: var(--teal);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,229,255,0.2);
      transition: opacity 0.1s, box-shadow 0.15s;
    }
    #reload-display-btn:hover { box-shadow: 0 0 18px rgba(0,229,255,0.4); }
    #reload-display-btn:active { opacity: 0.7; }

    #reload-display-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      min-height: 14px;
      margin-top: 6px;
    }

    /* Data */
    .data-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border: 1px solid #1a1a1a;
    }

    .data-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .clear-btn {
      padding: 8px 16px;
      background: var(--bg);
      border: 1px solid var(--coral);
      color: var(--coral);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.1s, box-shadow 0.15s;
    }
    .clear-btn:hover { box-shadow: 0 0 10px rgba(255,74,42,0.35); }
    .clear-btn:active { opacity: 0.7; }

    .data-status {
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      min-height: 12px;
      margin-top: 5px;
    }

    /* Camera controls */
    #cam-controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 14px;
    }

    .cam-ctrl-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .cam-ctrl-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .cam-ctrl-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    .cam-ctrl-val {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--amber);
    }

    .cam-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: #222;
      outline: none;
      cursor: pointer;
    }
    .cam-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--amber);
      cursor: pointer;
      border-radius: 0;
      box-shadow: 0 0 6px rgba(255,179,0,0.5);
    }
    .cam-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--amber);
      cursor: pointer;
      border-radius: 0;
      border: none;
    }

    #cam-ctrl-status {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green);
      min-height: 12px;
      margin-top: 4px;
    }

    /* Moderation log */
    #modlog-search {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      color: #888;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    #modlog-search:focus { border-color: var(--teal); }
    #modlog-search::placeholder { color: #2a2a2a; }

    #modlog-wrap { overflow-x: auto; }

    #modlog-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
    }
    #modlog-table th {
      text-align: left;
      padding: 6px 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--amber);
      opacity: 0.5;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    #modlog-table th:hover { opacity: 0.9; }
    #modlog-table th.sort-active { opacity: 1; }
    #modlog-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #111;
      color: #555;
      vertical-align: top;
    }
    #modlog-table tr:hover td { color: #777; }
    .modlog-reason-cell { color: var(--coral); }
    .modlog-time-cell { white-space: nowrap; color: #444; font-size: 8px; }
    .modlog-name-cell { color: #666; }
    #modlog-count {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      margin-top: 8px;
    }
    #modlog-empty {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
      padding: 8px 0;
    }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="page">

  <div id="meta">
    <span id="wordmark"><span id="wordmark-dot"></span>LiveDoodle</span>
    <a id="back" href="/">&#8592; HOME</a>
  </div>

  <h1>Admin</h1>

  <div class="rule"></div>

  <div id="lock">
    <div>
      <label class="field-label" for="pw-input">Password</label>
      <input id="pw-input" type="password" autocomplete="off" />
    </div>
    <button id="unlock-btn">UNLOCK</button>
    <div id="lock-status"></div>
  </div>

  <div id="panel">

    <div class="rule"></div>

    <!-- Camera -->
    <div>
      <div class="section-label">// Camera</div>
      <img id="camera-preview" src="" alt="camera feed" />
      <div id="camera-status" class="offline">Checking...</div>
      <div id="cam-controls"></div>
      <div style="margin-top:10px;">
        <button id="cam-auto-btn" class="clear-btn" style="border-color:var(--teal);color:var(--teal);width:100%;padding:10px;">AUTO RESET</button>
      </div>
      <div id="cam-ctrl-status"></div>
    </div>

    <div class="rule"></div>

    <!-- Presence -->
    <div>
      <div class="section-label">// Presence</div>
      <div id="presence-btns">
        <button class="presence-btn" id="btn-home">I AM HOME</button>
        <button class="presence-btn" id="btn-away">I AM AWAY</button>
      </div>
      <div style="margin-top:10px;">
        <button class="presence-btn" id="btn-coding" style="width:100%;font-size:9px;letter-spacing:0.1em;line-height:1.5;">I AM HOME AND MAKING CODE CHANGES TO UPDATE THE SITE. IF THINGS GET JANKY DURING YOUR VISIT, THAT'S WHY</button>
      </div>
      <div id="presence-status"></div>
    </div>

    <div class="rule"></div>

    <!-- Data -->
    <div>
      <div class="section-label">// Clear Data</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div>
          <div class="data-row">
            <span class="data-label">Guestbook</span>
            <button class="clear-btn" id="clear-guestbook">CLEAR</button>
          </div>
          <div class="data-status" id="status-guestbook"></div>
        </div>
        <div>
          <div class="data-row">
            <span class="data-label">Past Artwork</span>
            <div style="display:flex;gap:8px;">
              <button class="clear-btn" id="edit-artwork" style="border-color:var(--amber);color:var(--amber);">EDIT</button>
              <button class="clear-btn" id="clear-artwork">CLEAR</button>
            </div>
          </div>
          <div class="data-status" id="status-artwork"></div>
        </div>
      </div>
    </div>

    <div class="rule"></div>

    <!-- Moderation Log -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="section-label" style="margin-bottom:0;">// Moderation Log</div>
        <button id="reload-modlog-btn" class="clear-btn" style="border-color:var(--teal);color:var(--teal);font-size:8px;">REFRESH</button>
      </div>
      <input id="modlog-search" type="text" placeholder="SEARCH NAME / IP / LOCATION / REASON..." autocomplete="off" />
      <div id="modlog-list"></div>
      <div id="modlog-count"></div>
      <div id="modlog-status" class="data-status"></div>
    </div>

  </div>

</div>

<script>
  let pw = '';

  // Unlock
  document.getElementById('unlock-btn').addEventListener('click', async () => {
    pw = document.getElementById('pw-input').value;
    const status = document.getElementById('lock-status');
    try {
      const r = await fetch('/admin/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) {
        document.getElementById('lock').style.display = 'none';
        document.getElementById('panel').classList.add('visible');
        startCamera();
        fetchPresence();
        buildCamControls();
        loadModerationLog();
      } else {
        status.textContent = 'Wrong password.';
        pw = '';
      }
    } catch (_) {
      status.textContent = 'Network error.';
      pw = '';
    }
  });

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('unlock-btn').click();
  });

  // Camera
  let cameraInterval = null;
  function startCamera() {
    const img = document.getElementById('camera-preview');
    const statusEl = document.getElementById('camera-status');
    function refresh() {
      const next = new Image();
      next.onload = () => {
        img.src = next.src;
        statusEl.textContent = 'Online';
        statusEl.className = 'online';
      };
      next.onerror = () => {
        statusEl.textContent = 'Offline';
        statusEl.className = 'offline';
      };
      next.src = '/snapshot?' + Date.now();
    }
    refresh();
    cameraInterval = setInterval(refresh, 1000);
  }

  // Presence
  async function fetchPresence() {
    try {
      const r = await fetch('/status');
      // /status doesn't expose is_home, so check home page instead
    } catch (_) {}
    // Set active state based on current home page render
    try {
      const r = await fetch('/');
      const html = await r.text();
      const isHome = html.includes('class="home"');
      setPresenceActive(isHome);
    } catch (_) {}
  }

  function setPresenceActive(isHome) {
    document.getElementById('btn-home').classList.toggle('active', isHome);
    document.getElementById('btn-away').classList.toggle('active', !isHome);
  }

  document.getElementById('btn-home').addEventListener('click', async () => {
    const statusEl = document.getElementById('presence-status');
    try {
      const r = await fetch('/admin/set-home', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) { setPresenceActive(true); statusEl.textContent = 'Updated.'; }
      else { statusEl.textContent = 'Error.'; }
    } catch (_) { statusEl.textContent = 'Network error.'; }
    setTimeout(() => statusEl.textContent = '', 2000);
  });

  document.getElementById('btn-away').addEventListener('click', async () => {
    const statusEl = document.getElementById('presence-status');
    try {
      const r = await fetch('/admin/set-away', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) { setPresenceActive(false); statusEl.textContent = 'Updated.'; }
      else { statusEl.textContent = 'Error.'; }
    } catch (_) { statusEl.textContent = 'Network error.'; }
    setTimeout(() => statusEl.textContent = '', 2000);
  });

  document.getElementById('btn-coding').addEventListener('click', async () => {
    const statusEl = document.getElementById('presence-status');
    try {
      const r = await fetch('/admin/set-coding', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) { statusEl.textContent = 'Updated.'; }
      else { statusEl.textContent = 'Error.'; }
    } catch (_) { statusEl.textContent = 'Network error.'; }
    setTimeout(() => statusEl.textContent = '', 2000);
  });

  // Clear data
  async function clearData(endpoint, statusId) {
    const statusEl = document.getElementById(statusId);
    if (!confirm('Are you sure? This cannot be undone.')) return;
    try {
      const r = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (r.ok) { statusEl.textContent = 'Cleared.'; }
      else { statusEl.textContent = 'Error.'; }
    } catch (_) { statusEl.textContent = 'Network error.'; }
    setTimeout(() => statusEl.textContent = '', 3000);
  }

  document.getElementById('clear-guestbook').addEventListener('click', () =>
    clearData('/admin/clear-guestbook', 'status-guestbook'));
  document.getElementById('clear-artwork').addEventListener('click', () =>
    clearData('/admin/clear-artwork', 'status-artwork'));
  document.getElementById('edit-artwork').addEventListener('click', () => {
    sessionStorage.setItem('adminPw', pw);
    window.location.href = '/artwork?edit=1';
  });

  // Camera controls (keys match stream.py's /controls API)
  const CAM_CONTROLS = [
    { id: 'brightness', label: 'BRIGHTNESS',    min: -1.0, max: 1.0,    step: 0.05, def: 0.0   },
    { id: 'contrast',   label: 'CONTRAST',      min: 0.0,  max: 4.0,    step: 0.05, def: 1.0   },
    { id: 'saturation', label: 'SATURATION',    min: 0.0,  max: 4.0,    step: 0.05, def: 1.0   },
    { id: 'exposure',   label: 'EXPOSURE (μs)', min: 1000, max: 200000, step: 1000, def: 20000 },
    { id: 'gain',       label: 'GAIN',          min: 1.0,  max: 10.0,   step: 0.1,  def: 1.0   },
  ];

  function buildCamControls() {
    const container = document.getElementById('cam-controls');
    for (const ctrl of CAM_CONTROLS) {
      const row = document.createElement('div');
      row.className = 'cam-ctrl-row';

      const header = document.createElement('div');
      header.className = 'cam-ctrl-header';

      const label = document.createElement('span');
      label.className = 'cam-ctrl-label';
      label.textContent = ctrl.label;

      const valEl = document.createElement('span');
      valEl.className = 'cam-ctrl-val';
      valEl.id = 'camval-' + ctrl.id;
      valEl.textContent = ctrl.def;

      header.appendChild(label);
      header.appendChild(valEl);

      const slider = document.createElement('input');
      slider.type = 'range';
      slider.className = 'cam-slider';
      slider.min = ctrl.min;
      slider.max = ctrl.max;
      slider.step = ctrl.step;
      slider.value = ctrl.def;
      slider.id = 'camslider-' + ctrl.id;

      slider.addEventListener('input', () => {
        const val = parseFloat(slider.value);
        valEl.textContent = ctrl.id === 'ExposureTime' ? Math.round(val) : val.toFixed(ctrl.step < 1 ? 2 : 0);
        debouncedSendControl(ctrl.id, val);
      });

      row.appendChild(header);
      row.appendChild(slider);
      container.appendChild(row);
    }
  }

  let camCtrlTimer = null;
  const pendingControls = {};

  function debouncedSendControl(id, val) {
    pendingControls[id] = val;
    clearTimeout(camCtrlTimer);
    camCtrlTimer = setTimeout(flushCamControls, 120);
  }

  // Wire AUTO RESET button — sends {auto: true} to fully recreate camera (re-enables AE)
  document.getElementById('cam-auto-btn').addEventListener('click', async () => {
    const statusEl = document.getElementById('cam-ctrl-status');
    statusEl.textContent = 'Resetting...';
    try {
      const r = await fetch('/admin/camera-control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, auto: true }),
      });
      const data = await r.json();
      statusEl.textContent = data.ok ? 'Auto reset. Allow ~2s for AE to settle.' : ('Error: ' + (data.error || r.status));
    } catch (_) {
      statusEl.textContent = 'Network error.';
    }
    setTimeout(() => statusEl.textContent = '', 4000);
  });

  async function flushCamControls() {
    const payload = { password: pw, ...pendingControls };
    Object.keys(pendingControls).forEach(k => delete pendingControls[k]);
    const statusEl = document.getElementById('cam-ctrl-status');
    try {
      const r = await fetch('/admin/camera-control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      statusEl.textContent = data.ok ? 'Applied.' : ('Error: ' + (data.error || r.status));
    } catch (_) {
      statusEl.textContent = 'Network error.';
    }
    setTimeout(() => statusEl.textContent = '', 2000);
  }

  // Moderation log
  let modlogData = [];
  let modlogSort = { col: 'timestamp', dir: -1 };

  async function loadModerationLog() {
    const statusEl = document.getElementById('modlog-status');
    statusEl.textContent = 'Loading...';
    try {
      const r = await fetch('/admin/moderation-log?password=' + encodeURIComponent(pw));
      if (!r.ok) { statusEl.textContent = 'Error.'; return; }
      modlogData = await r.json();
      statusEl.textContent = '';
      renderModlogTable();
    } catch (_) {
      statusEl.textContent = 'Network error.';
    }
  }

  function renderModlogTable() {
    const query = (document.getElementById('modlog-search').value || '').toLowerCase();
    const filtered = modlogData.filter(e => {
      if (!query) return true;
      return (e.name || '').toLowerCase().includes(query) ||
             (e.ip || '').toLowerCase().includes(query) ||
             (e.location || '').toLowerCase().includes(query) ||
             (e.reason || '').toLowerCase().includes(query);
    });

    const col = modlogSort.col;
    const dir = modlogSort.dir;
    filtered.sort((a, b) => {
      const av = a[col] ?? '';
      const bv = b[col] ?? '';
      if (av < bv) return -dir;
      if (av > bv) return dir;
      return 0;
    });

    const list = document.getElementById('modlog-list');
    const countEl = document.getElementById('modlog-count');

    if (!filtered.length) {
      list.innerHTML = '<div id="modlog-empty">' + (modlogData.length ? 'No matches.' : 'No flags yet.') + '</div>';
      countEl.textContent = '';
      return;
    }

    const COLS = [
      { key: 'timestamp', label: 'Time' },
      { key: 'name',      label: 'Name' },
      { key: 'location',  label: 'Location' },
      { key: 'ip',        label: 'IP' },
      { key: 'reason',    label: 'Reason' },
    ];

    let html = '<div id="modlog-wrap"><table id="modlog-table"><thead><tr>';
    for (const c of COLS) {
      const active = modlogSort.col === c.key;
      const arrow = active ? (modlogSort.dir === 1 ? ' ▲' : ' ▼') : '';
      html += `<th data-col="${c.key}"${active ? ' class="sort-active"' : ''}>${c.label}${arrow}</th>`;
    }
    html += '</tr></thead><tbody>';
    for (const e of filtered) {
      const d = new Date(e.timestamp * 1000);
      const timeStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' })
        + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      html += '<tr>';
      html += `<td class="modlog-time-cell">${timeStr}</td>`;
      html += `<td class="modlog-name-cell">${e.name || '—'}</td>`;
      html += `<td>${e.location || '—'}</td>`;
      html += `<td>${e.ip || '—'}</td>`;
      html += `<td class="modlog-reason-cell">${e.reason || '—'}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    list.innerHTML = html;

    countEl.textContent = filtered.length + ' of ' + modlogData.length + ' FLAG' + (modlogData.length !== 1 ? 'S' : '');

    list.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const c = th.dataset.col;
        if (modlogSort.col === c) { modlogSort.dir *= -1; }
        else { modlogSort.col = c; modlogSort.dir = c === 'timestamp' ? -1 : 1; }
        renderModlogTable();
      });
    });
  }

  document.getElementById('reload-modlog-btn').addEventListener('click', loadModerationLog);
  document.getElementById('modlog-search').addEventListener('input', renderModlogTable);

</script>

<script>
  const sf = document.getElementById('starfield');
  const sfCtx = sf.getContext('2d');
  const SFCOLORS = ['#ffb300', '#00e5ff', '#ff4a2a', '#39ff14', '#bf5fff'];
  const SZ = 3, N = 40;
  function sfResize() { sf.width = window.innerWidth; sf.height = window.innerHeight; }
  sfResize();
  window.addEventListener('resize', sfResize);
  const pixels = Array.from({ length: N }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    speed: 0.3 + Math.random() * 0.6,
    color: SFCOLORS[Math.floor(Math.random() * SFCOLORS.length)],
    opacity: 0.08 + Math.random() * 0.22,
  }));
  (function tick() {
    sfCtx.clearRect(0, 0, sf.width, sf.height);
    for (const p of pixels) {
      sfCtx.globalAlpha = p.opacity;
      sfCtx.fillStyle = p.color;
      sfCtx.fillRect(Math.round(p.x), Math.round(p.y), SZ, SZ);
      p.y -= p.speed;
      if (p.y < -SZ) { p.y = sf.height + SZ; p.x = Math.random() * sf.width; p.color = SFCOLORS[Math.floor(Math.random() * SFCOLORS.length)]; }
    }
    sfCtx.globalAlpha = 1;
    requestAnimationFrame(tick);
  })();
  document.getElementById('wordmark-dot').style.animationDelay = -(performance.now() % 1000) + 'ms';
</script>
</body>
