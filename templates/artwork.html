<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle // Past Artwork</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
      --bg:     #0a0a0a;
    }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    #page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 44px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.5;
    }

    #wordmark-dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      flex-shrink: 0;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #back {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
    }
    #back:hover { color: #888; }

    h1 {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 18px rgba(57,255,20,0.4), 0 0 54px rgba(57,255,20,0.1);
    }

    .rule {
      height: 1px;
      background: linear-gradient(90deg, rgba(57,255,20,0.25), transparent);
    }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 400px) {
      #grid { grid-template-columns: 1fr; }
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid #1a1a1a;
    }

    .card-canvas-wrap {
      width: 100%;
      aspect-ratio: 5 / 3;
      background: white;
      position: relative;
      overflow: hidden;
    }

    .card-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .card-meta {
      padding: 7px 9px 8px;
      border-top: 1px solid #111;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .card-name {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.7;
    }

    .card-info {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      line-height: 1.5;
    }

    #empty, #loading {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
    }

    /* Lightbox */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal.open { display: flex; }

    #modal-inner {
      position: relative;
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid #333;
    }

    #modal-canvas-wrap {
      width: 100%;
      aspect-ratio: 5 / 3;
      background: white;
      position: relative;
      overflow: hidden;
    }

    #modal-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #modal-meta {
      padding: 10px 12px 11px;
      border-top: 1px solid #222;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: #0a0a0a;
    }

    #modal-name {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.7;
    }

    #modal-info {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    #modal-close {
      position: absolute;
      top: -36px;
      right: 0;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--coral);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 4px 0;
    }
    #modal-close:hover { color: var(--coral); }

    .card { cursor: pointer; }
    .card:hover .card-canvas-wrap { opacity: 0.85; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="page">

  <div id="meta">
    <span id="wordmark"><span id="wordmark-dot"></span>LiveDoodle</span>
    <a id="back" href="/">&#8592; HOME</a>
  </div>

  <h1>Past<br>Artwork</h1>

  <div class="rule"></div>

  <div id="grid"><div id="loading">Loading...</div></div>

</div>

<!-- Lightbox -->
<div id="modal">
  <div id="modal-inner">
    <button id="modal-close">[ CLOSE ]</button>
    <div id="modal-canvas-wrap">
      <canvas id="modal-canvas"></canvas>
    </div>
    <div id="modal-meta">
      <div id="modal-name"></div>
      <div id="modal-info"></div>
    </div>
  </div>
</div>

<script>
  function formatDate(ts) {
    const d = new Date(ts * 1000);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  const imageCache = {};

  function replayOnCanvas(canvas, strokes) {
    const ctx = canvas.getContext("2d");
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    let dashOffset = 0;

    function drawStroke(s) {
      const size = s.size >= 1 ? s.size : s.size * w;
      const segLen = Math.hypot((s.x1 - s.x0) * w, (s.y1 - s.y0) * h);
      ctx.beginPath();
      ctx.moveTo(s.x0 * w, s.y0 * h);
      ctx.lineTo(s.x1 * w, s.y1 * h);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = size;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      if (s.mode === "dotted") {
        const period = size * 2.5;
        ctx.setLineDash([0, period]);
        ctx.lineDashOffset = -dashOffset;
        dashOffset = (dashOffset + segLen) % period;
      } else if (s.mode === "dashed") {
        const period = size * 4 + size * 2;
        ctx.setLineDash([size * 4, size * 2]);
        ctx.lineDashOffset = -dashOffset;
        dashOffset = (dashOffset + segLen) % period;
      } else {
        ctx.setLineDash([]);
        dashOffset = 0;
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawStamp(s, img) {
      ctx.save();
      ctx.translate(s.x * w, s.y * h);
      if (s.r) ctx.rotate(s.r);
      ctx.drawImage(img, -s.w * w / 2, -s.h * h / 2, s.w * w, s.h * h);
      ctx.restore();
    }

    for (const s of strokes) {
      if (s.type === "stroke") {
        drawStroke(s);
      } else if (s.type === "stamp") {
        if (imageCache[s.data]) {
          drawStamp(s, imageCache[s.data]);
        } else {
          const img = new Image();
          img.onload = () => { imageCache[s.data] = img; drawStamp(s, img); };
          img.src = s.data;
        }
      }
    }
  }

  function sizeCanvas(canvas) {
    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();
    canvas.width = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
  }

  async function load() {
    const grid = document.getElementById("grid");
    try {
      const r = await fetch("/artwork/entries");
      const entries = await r.json();
      if (!entries.length) {
        grid.innerHTML = '<div id="empty">No artwork yet.</div>';
        return;
      }

      grid.innerHTML = "";
      const reversed = [...entries].reverse();

      for (const entry of reversed) {
        const card = document.createElement("div");
        card.className = "card";

        const wrap = document.createElement("div");
        wrap.className = "card-canvas-wrap";

        const canvas = document.createElement("canvas");
        canvas.className = "card-canvas";
        wrap.appendChild(canvas);

        const meta = document.createElement("div");
        meta.className = "card-meta";

        const nameEl = document.createElement("div");
        nameEl.className = "card-name";
        nameEl.textContent = entry.name || "Anonymous";

        const infoEl = document.createElement("div");
        infoEl.className = "card-info";
        const parts = [];
        if (entry.location) parts.push(entry.location);
        if (entry.time) parts.push(formatDate(entry.time));
        infoEl.textContent = parts.join(" // ");

        meta.appendChild(nameEl);
        meta.appendChild(infoEl);
        card.appendChild(wrap);
        card.appendChild(meta);
        grid.appendChild(card);

        // Size canvas after it's in the DOM, then replay
        requestAnimationFrame(() => {
          sizeCanvas(canvas);
          replayOnCanvas(canvas, entry.strokes || []);
        });

        card._entry = entry;
        card.addEventListener("click", () => openModal(entry));
      }
    } catch (_) {
      grid.innerHTML = '<div id="empty">Failed to load.</div>';
    }
  }

  load();

  // Lightbox
  const modal = document.getElementById("modal");
  const modalCanvas = document.getElementById("modal-canvas");
  const modalName = document.getElementById("modal-name");
  const modalInfo = document.getElementById("modal-info");

  function openModal(entry) {
    modalName.textContent = entry.name || "Anonymous";
    const parts = [];
    if (entry.location) parts.push(entry.location);
    if (entry.time) parts.push(formatDate(entry.time));
    modalInfo.textContent = parts.join(" // ");
    modal.classList.add("open");
    requestAnimationFrame(() => {
      const wrap = modalCanvas.parentElement;
      const rect = wrap.getBoundingClientRect();
      modalCanvas.width = Math.round(rect.width);
      modalCanvas.height = Math.round(rect.height);
      replayOnCanvas(modalCanvas, entry.strokes || []);
    });
  }

  function closeModal() {
    modal.classList.remove("open");
  }

  document.getElementById("modal-close").addEventListener("click", closeModal);
  modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  // Starfield
  const sf = document.getElementById("starfield");
  const sfCtx = sf.getContext("2d");
  const SFCOLORS = ["#ffb300", "#00e5ff", "#ff4a2a", "#39ff14", "#bf5fff"];
  const SZ = 3, N = 40;
  function sfResize() { sf.width = window.innerWidth; sf.height = window.innerHeight; }
  sfResize();
  window.addEventListener("resize", sfResize);
  const pixels = Array.from({ length: N }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    speed: 0.3 + Math.random() * 0.6,
    color: SFCOLORS[Math.floor(Math.random() * SFCOLORS.length)],
    opacity: 0.08 + Math.random() * 0.22,
  }));
  (function tick() {
    sfCtx.clearRect(0, 0, sf.width, sf.height);
    for (const p of pixels) {
      sfCtx.globalAlpha = p.opacity;
      sfCtx.fillStyle = p.color;
      sfCtx.fillRect(Math.round(p.x), Math.round(p.y), SZ, SZ);
      p.y -= p.speed;
      if (p.y < -SZ) { p.y = sf.height + SZ; p.x = Math.random() * sf.width; p.color = SFCOLORS[Math.floor(Math.random() * SFCOLORS.length)]; }
    }
    sfCtx.globalAlpha = 1;
    requestAnimationFrame(tick);
  })();
  document.getElementById('wordmark-dot').style.animationDelay = -(performance.now() % 1000) + 'ms';
</script>
</body>
</html>
