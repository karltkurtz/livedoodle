<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: white; cursor: none; }
    canvas { display: block; }
    body.cursor-visible, body.cursor-visible * { cursor: default !important; }

    /* ── Screensaver ── */
    #screensaver {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      font-family: 'Share Tech Mono', monospace;
    }

    #screensaver.active { opacity: 1; }

    #screensaver::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    #ss-starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #ss-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #ss-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #ss-dot {
      width: 8px;
      height: 8px;
      background: #ff4a2a;
      box-shadow: 0 0 8px #ff4a2a;
      animation: ss-blink 1s step-end infinite;
    }

    @keyframes ss-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #ss-title {
      font-size: clamp(36px, 8vw, 72px);
      letter-spacing: 0.25em;
      color: #ffb300;
      text-shadow: 0 0 20px rgba(255,179,0,0.5), 0 0 40px rgba(255,179,0,0.25);
      text-transform: uppercase;
    }

    #ss-sub {
      font-size: clamp(11px, 2vw, 16px);
      letter-spacing: 0.3em;
      color: #00e5ff;
      text-shadow: 0 0 10px rgba(0,229,255,0.4);
      text-transform: uppercase;
    }

    #reaction-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    .reaction-emoji {
      position: absolute;
      line-height: 1;
      animation: emoji-float 2.5s ease-out forwards;
    }

    @keyframes emoji-float {
      0%   { transform: translateY(0) scale(1);        opacity: 0.95; }
      15%  { transform: translateY(-6vh) scale(1.2);   opacity: 1;    }
      100% { transform: translateY(-48vh) scale(0.55); opacity: 0;    }
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="reaction-overlay"></div>

<!-- Screensaver overlay -->
<div id="screensaver">
  <canvas id="ss-starfield"></canvas>
  <div id="ss-content">
    <div id="ss-title-row">
      <div id="ss-dot"></div>
      <div id="ss-title">LIVEDOODLE</div>
    </div>
    <div id="ss-sub">PIGARAGE.COM &mdash; DRAW SOMETHING</div>
  </div>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });

  let history = [];
  const imageCache = {};  // data URL → HTMLImageElement
  let _dashOffset = 0;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    redraw();
  }

  function drawSegment(msg) {
    const size = msg.size >= 1 ? msg.size : msg.size * canvas.width;
    const segLen = Math.hypot(
      (msg.x1 - msg.x0) * canvas.width,
      (msg.y1 - msg.y0) * canvas.height
    );
    ctx.beginPath();
    ctx.moveTo(msg.x0 * canvas.width, msg.y0 * canvas.height);
    ctx.lineTo(msg.x1 * canvas.width, msg.y1 * canvas.height);
    ctx.strokeStyle = msg.color;
    ctx.lineWidth = size;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (msg.mode === "dotted") {
      const period = size * 2.5;
      ctx.setLineDash([0, period]);
      ctx.lineDashOffset = -_dashOffset;
      _dashOffset = (_dashOffset + segLen) % period;
    } else if (msg.mode === "dashed") {
      const period = size * 4 + size * 2;
      ctx.setLineDash([size * 4, size * 2]);
      ctx.lineDashOffset = -_dashOffset;
      _dashOffset = (_dashOffset + segLen) % period;
    } else {
      ctx.setLineDash([]);
      _dashOffset = 0;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function floodFill(cx, cy, color) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width, h = canvas.height;
    const px = Math.round(Math.max(0, Math.min(w - 1, cx)));
    const py = Math.round(Math.max(0, Math.min(h - 1, cy)));
    const idx = (py * w + px) * 4;
    const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];
    const fr = parseInt(color.slice(1,3), 16);
    const fg = parseInt(color.slice(3,5), 16);
    const fb = parseInt(color.slice(5,7), 16);
    if (tr === fr && tg === fg && tb === fb && ta === 255) return;
    const TOLERANCE = 32;
    function matches(i) {
      return Math.abs(data[i]-tr) + Math.abs(data[i+1]-tg) + Math.abs(data[i+2]-tb) + Math.abs(data[i+3]-ta) <= TOLERANCE;
    }
    const stack = [px + py * w];
    const visited = new Uint8Array(w * h);
    while (stack.length > 0) {
      const pos = stack.pop();
      if (visited[pos]) continue;
      visited[pos] = 1;
      if (!matches(pos * 4)) continue;
      data[pos*4] = fr; data[pos*4+1] = fg; data[pos*4+2] = fb; data[pos*4+3] = 255;
      const x = pos % w, y = (pos / w) | 0;
      if (x > 0)   stack.push(pos - 1);
      if (x < w-1) stack.push(pos + 1);
      if (y > 0)   stack.push(pos - w);
      if (y < h-1) stack.push(pos + w);
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function drawStamp(msg, img) {
    ctx.save();
    ctx.translate(msg.x * canvas.width, msg.y * canvas.height);
    if (msg.r) ctx.rotate(msg.r);
    ctx.drawImage(img, -msg.w * canvas.width / 2, -msg.h * canvas.height / 2, msg.w * canvas.width, msg.h * canvas.height);
    ctx.restore();
  }

  function clearCanvas() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function redraw() {
    clearCanvas();
    _dashOffset = 0;
    for (const msg of history) {
      if (msg.type === "stroke") {
        drawSegment(msg);
      } else if (msg.type === "stamp") {
        if (imageCache[msg.data]) {
          drawStamp(msg, imageCache[msg.data]);
        } else {
          const img = new Image();
          img.onload = () => { imageCache[msg.data] = img; redraw(); };
          img.src = msg.data;
        }
      } else if (msg.type === "fill") {
        floodFill(msg.x * canvas.width, msg.y * canvas.height, msg.color);
      }
    }
  }

  function spawnReaction(emoji) {
    const overlay = document.getElementById("reaction-overlay");
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        const el = document.createElement("div");
        el.className = "reaction-emoji";
        el.textContent = emoji;
        const x = 72 + Math.random() * 20;
        const size = 38 + Math.random() * 28;
        const duration = 2.1 + Math.random() * 0.8;
        el.style.cssText = `left:${x}%;bottom:12%;font-size:${size}px;animation-duration:${duration}s;`;
        overlay.appendChild(el);
        setTimeout(() => el.remove(), (duration + 0.15) * 1000);
      }, i * 160);
    }
  }

  function handleMessage(msg) {
    if (msg.type === "sync") {
      history = msg.history;
      redraw();
    } else if (msg.type === "stroke") {
      history.push(msg);
      drawSegment(msg);
    } else if (msg.type === "stamp") {
      history.push(msg);
      if (imageCache[msg.data]) {
        drawStamp(msg, imageCache[msg.data]);
      } else {
        const img = new Image();
        img.onload = () => { imageCache[msg.data] = img; drawStamp(msg, img); };
        img.src = msg.data;
      }
    } else if (msg.type === "fill") {
      history.push(msg);
      floodFill(msg.x * canvas.width, msg.y * canvas.height, msg.color);
    } else if (msg.type === "clear") {
      history = [];
      clearCanvas();
    } else if (msg.type === "reaction") {
      spawnReaction(msg.emoji);
    } else if (msg.type === "reload") {
      location.reload();
    }
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // ── WebSocket ──
  const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?role=display`;
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = e => handleMessage(JSON.parse(e.data));
    ws.onclose = () => setTimeout(connect, 2000);
  }

  connect();

  // ── Screensaver ──
  const IDLE_TIMEOUT_S = 20;
  const ss = document.getElementById("screensaver");
  const ssCanvas = document.getElementById("ss-starfield");
  const ssCtx = ssCanvas.getContext("2d");
  const ssContent = document.getElementById("ss-content");
  let ssVisible = false;
  let ssRafId = null;

  // Starfield: 40 × 3px squares drifting upward
  const SS_COLORS = ["#ffb300", "#00e5ff", "#ff4a2a", "#39ff14", "#bf5fff"];
  const ssStars = Array.from({ length: 40 }, () => ({
    x: Math.random(),
    y: Math.random(),
    speed: 0.0003 + Math.random() * 0.0004,
    color: SS_COLORS[Math.floor(Math.random() * SS_COLORS.length)],
  }));

  function resizeSsCanvas() {
    ssCanvas.width  = window.innerWidth;
    ssCanvas.height = window.innerHeight;
  }

  function animateSs(ts) {
    ssCtx.clearRect(0, 0, ssCanvas.width, ssCanvas.height);
    for (const s of ssStars) {
      s.y -= s.speed;
      if (s.y < 0) { s.y = 1; s.x = Math.random(); }
      ssCtx.fillStyle = s.color;
      ssCtx.globalAlpha = 0.5;
      ssCtx.fillRect(
        Math.round(s.x * ssCanvas.width),
        Math.round(s.y * ssCanvas.height),
        3, 3
      );
    }
    ssCtx.globalAlpha = 1;

    // Slow Lissajous drift — bounded so content never leaves the viewport
    const maxX = Math.max(0, (window.innerWidth  - ssContent.offsetWidth)  / 2 - 16);
    const maxY = Math.max(0, (window.innerHeight - ssContent.offsetHeight) / 2 - 16);
    const tx = Math.sin(ts * 0.00025) * maxX;
    const ty = Math.cos(ts * 0.00017) * maxY;
    ssContent.style.transform = `translate(${tx}px, ${ty}px)`;

    ssRafId = requestAnimationFrame(animateSs);
  }

  function showScreensaver() {
    if (ssVisible) return;
    ssVisible = true;
    resizeSsCanvas();
    if (!ssRafId) animateSs();
    ss.classList.add("active");
  }

  function hideScreensaver() {
    if (!ssVisible) return;
    ssVisible = false;
    ss.classList.remove("active");
    // Stop animation after fade completes
    setTimeout(() => {
      if (!ssVisible && ssRafId) {
        cancelAnimationFrame(ssRafId);
        ssRafId = null;
      }
    }, 1600);
  }

  async function checkActivity() {
    try {
      const r = await fetch("/activity");
      const data = await r.json();
      const age = data.last_visitor_time === 0
        ? Infinity
        : (Date.now() / 1000 - data.last_visitor_time);
      if (age >= IDLE_TIMEOUT_S) showScreensaver();
      else hideScreensaver();
    } catch (_) {}
  }

  window.addEventListener("resize", resizeSsCanvas);
  setInterval(checkActivity, 5000);
  checkActivity();

  // ── Cursor: hide after 10s of inactivity, show on touch/mouse ──
  let cursorTimer = null;
  function showCursor() {
    document.body.classList.add("cursor-visible");
    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => document.body.classList.remove("cursor-visible"), 10000);
  }
  window.addEventListener("mousemove", showCursor);
  window.addEventListener("touchstart", showCursor, { passive: true });
</script>
</body>
</html>
