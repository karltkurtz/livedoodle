<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle — Visitor Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
      --bg:     #0a0a0a;
    }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    #page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 44px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.5;
      text-decoration: none;
    }

    #wordmark-dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      flex-shrink: 0;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    h1 {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 0.95;
      text-transform: uppercase;
      color: var(--teal);
      text-shadow:
        0 0 18px rgba(0,229,255,0.5),
        0 0 54px rgba(0,229,255,0.12);
    }

    .rule {
      height: 1px;
      background: linear-gradient(90deg, rgba(0,229,255,0.35), transparent);
    }

    #map-wrap {
      position: relative;
      width: 100%;
      border: 1px solid rgba(0,229,255,0.18);
      box-shadow: 0 0 16px rgba(0,229,255,0.08);
      background: #040404;
      overflow: hidden;
    }

    #map-canvas {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 1;
    }

    #map-label {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--teal);
      opacity: 0.25;
      text-transform: uppercase;
    }

    #stats-row {
      display: flex;
      gap: 24px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      flex-wrap: wrap;
    }

    .stat-val {
      color: var(--teal);
      text-shadow: 0 0 6px rgba(0,229,255,0.3);
    }

    #countries-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .country-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .country-name {
      color: #666;
      width: 160px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .country-bar-wrap {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.05);
    }

    .country-bar {
      height: 3px;
      background: var(--teal);
      box-shadow: 0 0 4px rgba(0,229,255,0.5);
    }

    .country-count {
      color: var(--teal);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    #section-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
    }

    #back-btn {
      display: block;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--teal);
      color: var(--teal);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 0 8px rgba(0,229,255,0.2);
      transition: box-shadow 0.15s;
    }

    #back-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="scanlines"></div>

<div id="page">

  <div id="meta">
    <a id="wordmark" href="/"><span id="wordmark-dot"></span>LiveDoodle</a>
    <a id="back-btn" href="/">← HOME</a>
  </div>

  <h1>Visitor<br>Map</h1>
  <div class="rule"></div>

  <div id="map-wrap">
    <canvas id="map-canvas"></canvas>
    <span id="map-label">EQUIRECTANGULAR // ALL VISITORS</span>
  </div>

  <div id="stats-row">
    <span>VISITORS: <span class="stat-val" id="stat-count">—</span></span>
    <span>COUNTRIES: <span class="stat-val" id="stat-countries">—</span></span>
  </div>

  <div id="section-label">TOP STATES / REGIONS</div>
  <div id="regions-list"></div>

  <div id="section-label">TOP COUNTRIES</div>
  <div id="countries-list"></div>


</div>

<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
  // ── Starfield ──
  const sf = document.getElementById("starfield");
  const sfCtx = sf.getContext("2d");
  const SF_COLORS = ["#ffb300","#00e5ff","#ff4a2a","#39ff14","#bf5fff"];
  const SZ = 3, N = 40;
  function sfResize() { sf.width = window.innerWidth; sf.height = window.innerHeight; }
  sfResize();
  window.addEventListener("resize", sfResize);
  const pixels = Array.from({length: N}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    speed: 0.3 + Math.random() * 0.6,
    color: SF_COLORS[Math.floor(Math.random() * SF_COLORS.length)],
    opacity: 0.08 + Math.random() * 0.22,
  }));
  (function sfTick() {
    sfCtx.clearRect(0, 0, sf.width, sf.height);
    for (const p of pixels) {
      sfCtx.globalAlpha = p.opacity;
      sfCtx.fillStyle = p.color;
      sfCtx.fillRect(Math.round(p.x), Math.round(p.y), SZ, SZ);
      p.y -= p.speed;
      if (p.y < -SZ) { p.y = sf.height + SZ; p.x = Math.random() * sf.width; }
    }
    sfCtx.globalAlpha = 1;
    requestAnimationFrame(sfTick);
  })();

  // ── Map ──
  const mapCanvas = document.getElementById("map-canvas");
  const ctx = mapCanvas.getContext("2d");

  function latLonToXY(lat, lon, w, h) {
    return [
      (lon + 180) / 360 * w,
      (90 - lat) / 180 * h,
    ];
  }

  let _geoFeatures = null;
  async function loadGeo() {
    if (_geoFeatures) return _geoFeatures;
    const topo = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(r => r.json());
    _geoFeatures = topojson.feature(topo, topo.objects.countries).features;
    return _geoFeatures;
  }

  function drawRings(rings, w, h) {
    ctx.beginPath();
    for (const ring of rings) {
      let first = true;
      for (const [lon, lat] of ring) {
        const [x, y] = latLonToXY(lat, lon, w, h);
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }
    ctx.fill();
    ctx.stroke();
  }

  function drawCountries(features, w, h) {
    ctx.fillStyle = "rgba(0,229,255,0.05)";
    ctx.strokeStyle = "rgba(0,229,255,0.22)";
    ctx.lineWidth = 0.5;
    for (const f of features) {
      const g = f.geometry;
      if (!g) continue;
      if (g.type === "Polygon") {
        drawRings(g.coordinates, w, h);
      } else if (g.type === "MultiPolygon") {
        for (const poly of g.coordinates) drawRings(poly, w, h);
      }
    }
  }

  async function drawMap(visitors) {
    const dpr = window.devicePixelRatio || 1;
    const displayW = mapCanvas.offsetWidth;
    const displayH = mapCanvas.offsetHeight;
    const w = Math.round(displayW * dpr);
    const h = Math.round(displayH * dpr);
    mapCanvas.width = w;
    mapCanvas.height = h;

    // Background
    ctx.fillStyle = "#040404";
    ctx.fillRect(0, 0, w, h);

    // Grid lines — every 30°
    ctx.strokeStyle = "rgba(0,229,255,0.05)";
    ctx.lineWidth = 1;
    for (let lat = -90; lat <= 90; lat += 30) {
      const [, y] = latLonToXY(lat, 0, w, h);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    for (let lon = -180; lon <= 180; lon += 30) {
      const [x] = latLonToXY(0, lon, w, h);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }

    // Equator + prime meridian slightly brighter
    ctx.strokeStyle = "rgba(0,229,255,0.12)";
    const [, eqY] = latLonToXY(0, 0, w, h);
    const [pmX] = latLonToXY(0, 0, w, h);
    ctx.beginPath(); ctx.moveTo(0, eqY); ctx.lineTo(w, eqY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pmX, 0); ctx.lineTo(pmX, h); ctx.stroke();

    // Country outlines
    const geoFeatures = await loadGeo();
    drawCountries(geoFeatures, w, h);

    // Axis labels
    ctx.fillStyle = "rgba(0,229,255,0.2)";
    ctx.font = `${Math.round(8 * dpr)}px 'Share Tech Mono', monospace`;
    ctx.textAlign = "left";
    for (const lat of [60, 30, 0, -30, -60]) {
      const [, y] = latLonToXY(lat, -180, w, h);
      ctx.fillText((lat > 0 ? "+" : "") + lat + "°", 3 * dpr, y - 2 * dpr);
    }

    // Dots
    const dotR = Math.max(2.5, Math.min(5, w / 180)) * dpr;
    const glowR = dotR * 4;
    for (const v of visitors) {
      const [x, y] = latLonToXY(v.lat, v.lon, w, h);
      const g = ctx.createRadialGradient(x, y, 0, x, y, glowR);
      g.addColorStop(0,   "rgba(0,229,255,0.55)");
      g.addColorStop(0.4, "rgba(0,229,255,0.18)");
      g.addColorStop(1,   "rgba(0,229,255,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, glowR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(0,229,255,0.95)";
      ctx.beginPath();
      ctx.arc(x, y, dotR * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function buildStats(visitors, key) {
    const counts = {};
    for (const v of visitors) {
      if (v[key]) counts[v[key]] = (counts[v[key]] || 0) + 1;
    }
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 10);
  }

  function renderList(entries, elId) {
    const listEl = document.getElementById(elId);
    if (entries.length === 0) {
      listEl.innerHTML = '<div style="font-size:10px;color:#333;letter-spacing:0.1em;text-transform:uppercase;">No data yet</div>';
      return;
    }
    const max = entries[0][1];
    listEl.innerHTML = entries.map(([name, count]) => `
      <div class="country-row">
        <span class="country-name">${name}</span>
        <div class="country-bar-wrap">
          <div class="country-bar" style="width:${Math.round(count / max * 100)}%"></div>
        </div>
        <span class="country-count">${count}</span>
      </div>
    `).join("");
  }

  async function init() {
    let visitors = [];
    try {
      const r = await fetch("/visitors");
      visitors = await r.json();
    } catch (_) {}

    document.getElementById("stat-count").textContent = visitors.length || "0";

    const countries = new Set(visitors.map(v => v.country).filter(Boolean));
    document.getElementById("stat-countries").textContent = countries.size || "0";

    await drawMap(visitors);
    renderList(buildStats(visitors, "region"), "regions-list");
    renderList(buildStats(visitors, "country"), "countries-list");
  }

  init();
  window.addEventListener("resize", () => {
    fetch("/visitors").then(r => r.json()).then(drawMap).catch(() => {});
  });
</script>
</body>
</html>
