<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    #dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #e63333;
      box-shadow: 0 0 0 0 rgba(230, 51, 51, 0.6);
      animation: pulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(230, 51, 51, 0.7); }
      60%  { box-shadow: 0 0 0 10px rgba(230, 51, 51, 0); }
      100% { box-shadow: 0 0 0 0   rgba(230, 51, 51, 0); }
    }

    #brand-live {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-transform: uppercase;
    }

    #brand-doodle {
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      color: #888;
      letter-spacing: 0.02em;
    }

    #stream-wrapper {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    #stream {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #draw-btn {
      display: block;
      padding: 16px 48px;
      background: #e63333;
      color: white;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-decoration: none;
      border-radius: 8px;
      transition: opacity 0.15s;
    }

    #draw-btn:active { opacity: 0.7; }
  </style>
</head>
<body>

<div id="brand">
  <div id="dot"></div>
  <span id="brand-live">Live</span>
  <span id="brand-doodle">Doodle</span>
</div>

<div id="stream-wrapper">
  <img id="stream" src="/snapshot" alt="Live feed" />
</div>

<a id="draw-btn" href="/draw">DRAW!</a>

<script>
  const img = document.getElementById("stream");
  setInterval(() => {
    img.src = "/snapshot?" + Date.now();
  }, 100);
</script>

</body>
</html>
