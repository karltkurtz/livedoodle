<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveDoodle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
      --bg:     #0a0a0a;
    }

    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: #555;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.1) 3px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Pixel starfield */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    #page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      padding: 44px 20px 38px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Meta row */
    #meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.5;
    }

    #presence {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #presence.home { color: var(--green); }
    #presence.away { color: var(--amber); }

    #wordmark-dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      flex-shrink: 0;
      animation: blink 1s step-end infinite;
    }

    #live-badge {
      position: absolute;
      top: 8px; right: 8px;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--coral);
      border: 1px solid rgba(255,74,42,0.4);
      padding: 4px 10px;
      background: rgba(0,0,0,0.6);
    }

    #live-dot {
      width: 5px; height: 5px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Hero */
    #hero { display: flex; flex-direction: column; gap: 12px; }

    h1 {
      font-size: clamp(35px, 9.4vw, 59px);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow:
        0 0 18px rgba(255,179,0,0.5),
        0 0 54px rgba(255,179,0,0.12);
    }

    h1 .accent {
      display: block;
      color: transparent;
      -webkit-text-stroke: 2px var(--teal);
      text-shadow:
        0 0 14px rgba(0,229,255,0.45),
        0 0 44px rgba(0,229,255,0.12);
    }

    #desc {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #555;
      text-transform: uppercase;
      line-height: 1.6;
    }

    /* Rule */
    .rule {
      height: 1px;
      background: linear-gradient(90deg, rgba(0,229,255,0.25), transparent);
    }

    /* Stream */
    #stream-frame {
      position: relative;
      width: 100%;
      padding: 4px;
    }

    #stream-frame::before,
    #stream-frame::after,
    #stream-inner::before,
    #stream-inner::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border: 2px solid var(--teal);
      z-index: 3;
      box-shadow: 0 0 6px rgba(0,229,255,0.3);
    }

    #stream-frame::before { top: 0;    left: 0;   border-width: 2px 0 0 2px; }
    #stream-frame::after  { top: 0;    right: 0;  border-width: 2px 2px 0 0; }
    #stream-inner::before { bottom: 0; left: 0;   border-width: 0 0 2px 2px; }
    #stream-inner::after  { bottom: 0; right: 0;  border-width: 0 2px 2px 0; }

    #stream-inner { position: relative; width: 100%; }

    #stream-wrapper {
      width: 100%;
      aspect-ratio: 4/3;
      background: #030303;
      border: 1px solid #111;
      overflow: hidden;
      position: relative;
    }

    #stream-wrapper::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
      animation: scanmove 3.5s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes scanmove {
      0%   { top: -2px; }
      100% { top: 100%; }
    }

    #stream {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    #feed-label {
      position: absolute;
      bottom: 8px; right: 10px;
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--teal);
      opacity: 0.3;
      z-index: 3;
    }

    /* Actions */
    #actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    @keyframes cycle-color {
      0%   { border-color: var(--amber);  box-shadow: 0 0 14px rgba(255,179,0,0.55),  0 0 36px rgba(255,179,0,0.12);  color: var(--amber);  }
      20%  { border-color: var(--teal);   box-shadow: 0 0 14px rgba(0,229,255,0.55),  0 0 36px rgba(0,229,255,0.12);  color: var(--teal);   }
      40%  { border-color: var(--coral);  box-shadow: 0 0 14px rgba(255,74,42,0.55),  0 0 36px rgba(255,74,42,0.12);  color: var(--coral);  }
      60%  { border-color: var(--green);  box-shadow: 0 0 14px rgba(57,255,20,0.55),  0 0 36px rgba(57,255,20,0.12);  color: var(--green);  }
      80%  { border-color: var(--purple); box-shadow: 0 0 14px rgba(191,95,255,0.55), 0 0 36px rgba(191,95,255,0.12); color: var(--purple); }
      100% { border-color: var(--amber);  box-shadow: 0 0 14px rgba(255,179,0,0.55),  0 0 36px rgba(255,179,0,0.12);  color: var(--amber);  }
    }

    #draw-btn {
      flex: 1;
      padding: 16px 20px;
      background: var(--bg);
      border: 2px solid var(--amber);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      display: block;
      animation: cycle-color 10s linear infinite;
      transition: opacity 0.1s;
    }

    #draw-btn:active { opacity: 0.7; }

    #draw-btn.busy {
      animation: none;
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 14px rgba(255,179,0,0.3);
      pointer-events: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      line-height: 1.5;
    }

    #draw-countdown {
      display: block;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--amber);
      margin-top: 2px;
    }

    #hint {
      font-size: 9px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.9;
      flex-shrink: 0;
      text-align: right;
    }

    #nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .nav-btn {
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      display: block;
      transition: opacity 0.1s, box-shadow 0.15s;
    }

    .nav-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="page">

  <div id="meta">
    <span id="wordmark"><span id="wordmark-dot"></span>LiveDoodle</span>
    <span id="presence" class="{{ 'home' if is_home else 'away' }}">{{ 'I AM HOME' if is_home else 'I AM AWAY' }}</span>
  </div>

  <div id="hero">
    <h1>Draw.<br><span class="accent">Live.</span></h1>
    <p id="desc">// real strokes &middot; real screen &middot; no signup</p>
  </div>

  <div class="rule"></div>

  <div id="stream-frame">
    <div id="stream-inner">
      <div id="live-badge">
        <div id="live-dot"></div>
        LIVE
      </div>
      <div id="stream-wrapper">
        <img id="stream" src="/snapshot" alt="" />
        <span id="feed-label">FEED_01 // LIVE</span>
      </div>
    </div>
  </div>

  <div id="actions">
    <a id="draw-btn" href="/draw">DRAW!</a>
    <p id="hint">renders on a<br>7" screen in<br>someone's garage</p>
  </div>

  <div id="nav">
    <a class="nav-btn" href="/about"    style="border-color:var(--teal);  color:var(--teal);  box-shadow:0 0 8px rgba(0,229,255,0.25);">ABOUT</a>
    <a class="nav-btn" href="/donate"   style="border-color:var(--coral);  color:var(--coral); box-shadow:0 0 8px rgba(255,74,42,0.25);">DONATE</a>
    <a class="nav-btn" href="/guestbook" style="border-color:var(--purple); color:var(--purple);box-shadow:0 0 8px rgba(191,95,255,0.25);">GUESTBOOK</a>
    <a class="nav-btn" href="/artwork"  style="border-color:var(--green);  color:var(--green); box-shadow:0 0 8px rgba(57,255,20,0.25);">PAST ARTWORK</a>
  </div>

</div>

<script>
  // Snapshot refresh
  const img = document.getElementById("stream");
  setInterval(() => { img.src = "/snapshot?" + Date.now(); }, 100);

  // Draw button availability + synced countdown
  const drawBtn = document.getElementById("draw-btn");
  const SESSION_MS = 5 * 60 * 1000;
  let localDeadline = null;
  let countdownInterval = null;

  function updateDrawBtn(drawing, sessionElapsed) {
    if (drawing && sessionElapsed !== null) {
      localDeadline = Date.now() + (SESSION_MS - sessionElapsed * 1000);
      if (!drawBtn.classList.contains("busy")) {
        drawBtn.classList.add("busy");
        drawBtn.innerHTML = 'SOMEONE IS DRAWING<br><span id="draw-countdown"></span>';
        drawBtn.removeAttribute("href");
      }
      tickCountdown();
      if (!countdownInterval) countdownInterval = setInterval(tickCountdown, 1000);
    } else {
      drawBtn.classList.remove("busy");
      drawBtn.textContent = "DRAW!";
      drawBtn.setAttribute("href", "/draw");
      localDeadline = null;
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
  }

  function tickCountdown() {
    const el = document.getElementById("draw-countdown");
    if (!el || localDeadline === null) return;
    const remaining = Math.max(0, localDeadline - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    el.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
  }

  async function pollStatus() {
    try {
      const r = await fetch("/status");
      const { drawing, session_elapsed } = await r.json();
      updateDrawBtn(drawing, session_elapsed);
    } catch (_) {}
  }
  pollStatus();
  setInterval(pollStatus, 500);

  // Pixel starfield
  const sf = document.getElementById("starfield");
  const ctx = sf.getContext("2d");
  const COLORS = ["#ffb300", "#00e5ff", "#ff4a2a", "#39ff14", "#bf5fff"];
  const SZ = 3;
  const N = 40;

  function resize() {
    sf.width = window.innerWidth;
    sf.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  const pixels = Array.from({ length: N }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    speed: 0.3 + Math.random() * 0.6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    opacity: 0.08 + Math.random() * 0.22,
  }));

  (function tick() {
    ctx.clearRect(0, 0, sf.width, sf.height);
    for (const p of pixels) {
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), SZ, SZ);
      p.y -= p.speed;
      if (p.y < -SZ) {
        p.y = sf.height + SZ;
        p.x = Math.random() * sf.width;
        p.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  })();

  // Sync blink dots to same phase
  const blinkDelay = -(performance.now() % 1000) + 'ms';
  document.getElementById('live-dot').style.animationDelay = blinkDelay;
  document.getElementById('wordmark-dot').style.animationDelay = blinkDelay;
</script>
</body>
</html>
