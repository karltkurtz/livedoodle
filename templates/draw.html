<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LiveDoodle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f5f5;
      font-family: 'Share Tech Mono', monospace;
      touch-action: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      background: white;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
      padding: 10px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    /* Amber top rule */
    #toolbar::before {
      content: '';
      position: absolute;
      top: -2px; left: 0; right: 0;
      height: 2px;
      background: var(--amber);
      box-shadow: 0 0 8px rgba(255,179,0,0.6);
    }

    /* Branding */
    #brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    #brand-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #timer {
      font-size: 12px;
      color: #333;
      letter-spacing: 0.1em;
    }

    #timer.urgent {
      color: var(--coral);
      animation: timer-pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes timer-pulse {
      from { opacity: 1; }
      to   { opacity: 0.3; }
    }

    #dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #brand-name {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow: 0 0 8px rgba(255,179,0,0.4);
    }

    /* Color swatches */
    #swatches {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
    }

    .swatch {
      width: 26px; height: 26px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 8px currentColor;
    }

    /* Controls row */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #size-label {
      color: #333;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #brush-size {
      flex: 1;
      accent-color: var(--amber);
      height: 3px;
      cursor: pointer;
    }

    button {
      padding: 6px 14px;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #444;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s, opacity 0.1s;
    }

    button:active { opacity: 0.7; }

    #eraser-btn { }

    #eraser-btn.active {
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    #clear-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
      box-shadow: 0 0 10px rgba(255,74,42,0.35);
    }

    #done-btn {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.3);
    }

    #done-btn:hover {
      box-shadow: 0 0 14px rgba(57,255,20,0.55);
    }

    /* ── Name prompt modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.visible {
      display: flex;
    }

    #modal {
      background: #0a0a0a;
      border: 1px solid var(--green);
      box-shadow: 0 0 24px rgba(57,255,20,0.25);
      padding: 24px 20px 20px;
      width: min(320px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #modal-title {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 8px rgba(57,255,20,0.4);
    }

    #name-input {
      background: #111;
      border: 1px solid #333;
      color: #eee;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #name-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.25);
    }

    #modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <div id="brand">
    <div id="brand-left">
      <div id="dot"></div>
      <span id="brand-name">LiveDoodle</span>
    </div>
    <span id="timer">5:00</span>
  </div>

  <div id="swatches"></div>

  <div id="controls">
    <span id="size-label">SIZE</span>
    <input id="brush-size" type="range" min="1" max="40" value="6" />
    <button id="eraser-btn">ERASER</button>
    <button id="clear-btn">CLEAR</button>
    <button id="done-btn">DONE</button>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">Sign your doodle</div>
    <input id="name-input" type="text" maxlength="40" placeholder="Anonymous" autocomplete="off" spellcheck="false" />
    <div id="modal-actions">
      <button id="cancel-btn">CANCEL</button>
      <button id="submit-btn" style="border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.3);">SUBMIT</button>
    </div>
  </div>
</div>

<script>
  const COLORS = [
    "#1a1a1a", "#e63333", "#e67c33", "#e6d633",
    "#33c44a", "#3399e6", "#7c33e6", "#e633b8",
    "#ffffff", "#888888",
  ];

  // ── Canvas setup ──
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const toolbar = document.getElementById("toolbar");

  function resizeCanvas() {
    const toolbarH = toolbar.offsetHeight;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - toolbarH;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // ── State ──
  let currentColor = COLORS[0];
  let isErasing = false;
  let brushSize = 6;
  let drawing = false;
  let prevX = 0, prevY = 0;

  // ── Build swatches ──
  const swatchesEl = document.getElementById("swatches");
  COLORS.forEach((color) => {
    const el = document.createElement("div");
    el.className = "swatch" + (color === currentColor ? " active" : "");
    el.style.background = color;
    if (color === "#ffffff") el.style.border = "2px solid #555";
    el.addEventListener("click", () => {
      currentColor = color;
      isErasing = false;
      eraserBtn.classList.remove("active");
      document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
    });
    swatchesEl.appendChild(el);
  });

  // ── Brush size ──
  const brushSlider = document.getElementById("brush-size");
  brushSlider.addEventListener("input", () => { brushSize = parseInt(brushSlider.value); });

  // ── Eraser ──
  const eraserBtn = document.getElementById("eraser-btn");
  eraserBtn.addEventListener("click", () => {
    isErasing = !isErasing;
    eraserBtn.classList.toggle("active", isErasing);
    if (isErasing) {
      document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
    }
  });

  // ── Clear ──
  document.getElementById("clear-btn").addEventListener("click", () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const duration = Math.round((Date.now() - sessionStart) / 1000);
    send({ type: "clear", name: "Anonymous", duration });
  });

  // ── Drawing helpers ──
  function getColor() {
    return isErasing ? "#ffffff" : currentColor;
  }

  function drawSegment(x0, y0, x1, y1, color, size) {
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();
  }

  function startDraw(x, y) {
    drawing = true;
    prevX = x; prevY = y;
  }

  function moveDraw(x, y) {
    if (!drawing) return;
    const color = getColor();
    const size = brushSize;
    drawSegment(prevX, prevY, x, y, color, size);
    send({
      type: "stroke",
      color, size,
      x0: prevX / canvas.width,  y0: prevY / canvas.height,
      x1: x    / canvas.width,   y1: y    / canvas.height,
    });
    prevX = x; prevY = y;
  }

  function endDraw() { drawing = false; }

  // ── Mouse events ──
  canvas.addEventListener("mousedown", e => startDraw(e.offsetX, e.offsetY));
  canvas.addEventListener("mousemove", e => moveDraw(e.offsetX, e.offsetY));
  canvas.addEventListener("mouseup", endDraw);
  canvas.addEventListener("mouseleave", endDraw);

  // ── Touch events (passive:false to prevent scroll) ──
  function touchCoords(touch) {
    const rect = canvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const { x, y } = touchCoords(e.touches[0]);
    startDraw(x, y);
  }, { passive: false });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    const { x, y } = touchCoords(e.touches[0]);
    moveDraw(x, y);
  }, { passive: false });

  canvas.addEventListener("touchend", e => { e.preventDefault(); endDraw(); }, { passive: false });
  canvas.addEventListener("touchcancel", e => { e.preventDefault(); endDraw(); }, { passive: false });

  // ── WebSocket ──
  const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?role=draw`;
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onclose = () => setTimeout(connect, 2000);
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  connect();

  // ── DONE / name prompt ──
  const sessionStart = Date.now();
  const modalOverlay = document.getElementById("modal-overlay");
  const nameInput    = document.getElementById("name-input");

  document.getElementById("done-btn").addEventListener("click", () => {
    nameInput.value = "";
    modalOverlay.classList.add("visible");
    setTimeout(() => nameInput.focus(), 50);
  });

  document.getElementById("cancel-btn").addEventListener("click", () => {
    modalOverlay.classList.remove("visible");
  });

  function submitDoodle() {
    const name = nameInput.value.trim() || "Anonymous";
    const duration = Math.round((Date.now() - sessionStart) / 1000);
    send({ type: "finish", name, duration });
    modalOverlay.classList.remove("visible");
  }

  document.getElementById("submit-btn").addEventListener("click", submitDoodle);

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") submitDoodle();
    if (e.key === "Escape") modalOverlay.classList.remove("visible");
  });

  // ── Session timer (5 minutes) ──
  const SESSION_MS = 5 * 60 * 1000;
  const deadline = Date.now() + SESSION_MS;
  const timerEl = document.getElementById("timer");

  function updateTimer() {
    const remaining = Math.max(0, deadline - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
    if (remaining <= 30000) timerEl.classList.add("urgent");
    if (remaining === 0) window.location.href = "/";
  }

  updateTimer();
  setInterval(updateTimer, 1000);
</script>
</body>
</html>
