<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LiveDoodle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #ffb300;
      --teal:   #00e5ff;
      --coral:  #ff4a2a;
      --green:  #39ff14;
      --purple: #bf5fff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Share Tech Mono', monospace;
      touch-action: none;
      display: flex;
      flex-direction: column;
    }

    #canvas-area {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px 8px 0;
    }

    #canvas-wrapper {
      width: 100%;
      aspect-ratio: 5 / 3;
      position: relative;
      border: 1px solid var(--amber);
      box-shadow: 0 0 18px rgba(255,179,0,0.35), 0 0 4px rgba(255,179,0,0.2);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: white;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Stamp overlay ── */
    #stamp-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      touch-action: none;
    }

    #stamp-overlay.active { display: block; }

    #stamp-box {
      position: absolute;
      cursor: move;
      user-select: none;
      transform-origin: 50% 50%;
    }

    #stamp-box img {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .s-handle {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #0a0a0a;
      border: 2px solid var(--amber);
      box-shadow: 0 0 6px rgba(255,179,0,0.5);
      cursor: pointer;
    }

    #s-tl { top: -9px; left: -9px; }
    #s-tr { top: -9px; right: -9px; }
    #s-bl { bottom: -9px; left: -9px; }
    #s-br { bottom: -9px; right: -9px; }

    #s-rot-line {
      position: absolute;
      width: 1px;
      background: rgba(191,95,255,0.4);
      left: 50%;
      transform: translateX(-50%);
      top: -42px;
      height: 42px;
      pointer-events: none;
    }

    #s-rot {
      position: absolute;
      width: 22px;
      height: 22px;
      background: #0a0a0a;
      border: 2px solid var(--purple);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(191,95,255,0.5);
      left: 50%;
      top: -64px;
      transform: translateX(-50%);
      cursor: grab;
    }

    #stamp-controls {
      display: none;
      justify-content: center;
      gap: 8px;
    }

    #toolbar.stamp-mode #brand,
    #toolbar.stamp-mode #tools-section,
    #toolbar.stamp-mode #swatches,
    #toolbar.stamp-mode #controls {
      opacity: 0.25;
      pointer-events: none;
    }

    #tools-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #tools-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    #shape-toggle-btn {
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 8px rgba(191,95,255,0.3);
      width: 120px;
    }

    #shape-toggle-btn.open {
      box-shadow: 0 0 14px rgba(191,95,255,0.6);
    }

    #shape-picker {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    #shape-picker.open { display: flex; }

    .shape-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 8px rgba(191,95,255,0.3);
    }

    #brush-toggle-btn {
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 8px rgba(0,229,255,0.3);
      width: 120px;
    }

    #brush-toggle-btn.open { box-shadow: 0 0 14px rgba(0,229,255,0.6); }
    #brush-toggle-btn.active { border-color: var(--teal); color: var(--teal); }

    #brush-picker {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    #brush-picker.open { display: flex; }

    .brush-mode-btn.active {
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 8px rgba(0,229,255,0.3);
    }

    /* ── Toolbar ── */
    #toolbar {
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
      padding: 36px 12px 48px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
    }

    #toolbar::before {
      content: '';
      position: absolute;
      top: -2px; left: 0; right: 0;
      height: 2px;
      background: var(--amber);
      box-shadow: 0 0 8px rgba(255,179,0,0.6);
    }

    #brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    #brand-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #timer-bar {
      text-align: center;
      padding: 6px 12px 2px;
      background: #0a0a0a;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #555;
      text-transform: uppercase;
    }

    #timer {
      font-size: 36px;
      color: var(--coral);
      letter-spacing: 0.08em;
    }

    #timer.urgent {
      animation: timer-pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes timer-pulse {
      from { opacity: 1; }
      to   { opacity: 0.3; }
    }

    #dot {
      width: 6px; height: 6px;
      background: var(--coral);
      box-shadow: 0 0 6px var(--coral);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    #brand-name {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow: 0 0 8px rgba(255,179,0,0.4);
    }

    #swatches {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .swatch {
      width: 26px; height: 26px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }

    .swatch.active {
      border-color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 8px currentColor;
    }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    #size-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #btn-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    #size-label {
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #brush-size {
      flex: 1;
      accent-color: var(--amber);
      height: 3px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    #brush-size::-webkit-slider-runnable-track {
      height: 3px;
      background: #fff;
      border-radius: 0;
    }

    #brush-size::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--amber);
      border-radius: 0;
      margin-top: -5.5px;
      box-shadow: 0 0 6px rgba(255,179,0,0.5);
    }

    #brush-size::-moz-range-track {
      height: 3px;
      background: #fff;
    }

    #brush-size::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--amber);
      border: none;
      border-radius: 0;
      box-shadow: 0 0 6px rgba(255,179,0,0.5);
    }

    button {
      padding: 6px 14px;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      color: #555;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s, opacity 0.1s;
    }

    button:active { opacity: 0.7; }

    #eraser-btn.active {
      border-color: var(--teal);
      color: var(--teal);
      box-shadow: 0 0 10px rgba(0,229,255,0.4);
    }

    #undo-btn.enabled {
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 8px rgba(255,179,0,0.3);
    }

    #clear-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
      box-shadow: 0 0 10px rgba(255,74,42,0.35);
    }

    #stamp-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
      box-shadow: 0 0 10px rgba(191,95,255,0.35);
    }

    #done-btn {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.3);
    }

    #done-btn:hover {
      box-shadow: 0 0 14px rgba(57,255,20,0.55);
    }

    /* ── Modals (shared) ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: #0a0a0a;
      padding: 24px 20px 20px;
      width: min(320px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-title {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Sign modal — green border */
    #sign-overlay .modal {
      border: 1px solid var(--green);
      box-shadow: 0 0 24px rgba(57,255,20,0.25);
    }

    #sign-overlay .modal-title {
      color: var(--green);
      text-shadow: 0 0 8px rgba(57,255,20,0.4);
    }

    /* Keep/erase modal — amber border */
    #keeperase-overlay .modal {
      border: 1px solid var(--amber);
      box-shadow: 0 0 24px rgba(255,179,0,0.2);
    }

    #keeperase-overlay .modal-title {
      color: var(--amber);
      text-shadow: 0 0 8px rgba(255,179,0,0.4);
    }

    #keeperase-overlay .modal-subtitle {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
    }

    #name-input {
      background: #111;
      border: 1px solid #333;
      color: #eee;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #name-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(57,255,20,0.25);
    }
  </style>
</head>
<body>

<div id="timer-bar">Your art will automatically submit in &mdash; <span id="timer">5:00</span></div>

<div id="canvas-area">
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
    <div id="stamp-overlay">
      <div id="stamp-box">
        <img id="stamp-img" draggable="false" alt="" />
        <div class="s-handle" id="s-tl"></div>
        <div class="s-handle" id="s-tr"></div>
        <div class="s-handle" id="s-bl"></div>
        <div class="s-handle" id="s-br"></div>
        <div id="s-rot-line"></div>
        <div id="s-rot"></div>
      </div>
    </div>
  </div>
</div>

<div id="toolbar">
  <div id="stamp-controls">
    <button id="discard-stamp-btn" style="border-color:var(--coral);color:var(--coral);box-shadow:0 0 8px rgba(255,74,42,0.3);">REMOVE</button>
    <button id="place-stamp-btn" style="border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.3);">KEEP</button>
  </div>
  <div id="brand">
    <div id="brand-left">
      <div id="dot"></div>
      <span id="brand-name">LiveDoodle</span>
    </div>
  </div>

  <div id="swatches"></div>

  <div id="tools-section">
    <div id="tools-btns">
      <button id="shape-toggle-btn">SHAPES</button>
      <button id="brush-toggle-btn">BRUSH</button>
    </div>
    <div id="shape-picker">
      <button class="shape-btn" data-shape="circle">CIRCLE</button>
      <button class="shape-btn" data-shape="square">SQUARE</button>
      <button class="shape-btn" data-shape="triangle">TRI</button>
      <button class="shape-btn" data-shape="star">STAR</button>
      <button class="shape-btn" data-shape="diamond">DIAMOND</button>
      <button class="shape-btn" data-shape="hexagon">HEX</button>
    </div>
    <div id="brush-picker">
      <button class="brush-mode-btn active" data-mode="solid">SOLID</button>
      <button class="brush-mode-btn" data-mode="dotted">DOTTED</button>
      <button class="brush-mode-btn" data-mode="dashed">DASHED</button>
    </div>
  </div>

  <div id="controls">
    <div id="size-row">
      <span id="size-label">SIZE</span>
      <input id="brush-size" type="range" min="1" max="40" value="6" />
    </div>
    <div id="btn-row">
      <button id="eraser-btn">ERASER</button>
      <button id="undo-btn">UNDO</button>
      <button id="clear-btn">CLEAR</button>
      <input id="stamp-input" type="file" accept="image/*" style="display:none" />
      <button id="stamp-btn">IMAGE</button>
      <button id="done-btn">DONE</button>
    </div>
  </div>
</div>

<!-- Sign your doodle modal -->
<div id="sign-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Finished? Sign Your Doodle</div>
    <input id="name-input" type="text" maxlength="40" placeholder="Anonymous" autocomplete="off" spellcheck="false" />
    <div class="modal-actions">
      <button id="cancel-btn" style="border-color:var(--amber);color:var(--amber);box-shadow:0 0 8px rgba(255,179,0,0.3);">NOT DONE</button>
      <button id="submit-btn" style="border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.3);">SUBMIT</button>
    </div>
  </div>
</div>

<!-- Keep / erase existing art modal -->
<div id="keeperase-overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-subtitle" id="keeperase-overlay">Keep existing art, or start fresh?</div>
    <div class="modal-actions">
      <button id="erase-btn" style="border-color:var(--amber);color:var(--amber);box-shadow:0 0 8px rgba(255,179,0,0.3);">ERASE</button>
      <button id="keep-btn" style="border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.3);">KEEP</button>
    </div>
  </div>
</div>

<script>
  const COLORS = [
    "#1a1a1a", "#e63333", "#e67c33", "#e6d633",
    "#33c44a", "#3399e6", "#7c33e6", "#e633b8",
    "#ffffff", "#888888",
    "#cc0000", "#8b4513", "#e6a817", "#00cc66",
    "#00ccdd", "#0044cc", "#550099", "#ff66aa",
    "#444444", "#ffccaa",
  ];

  // ── Canvas setup ──
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const wrapper = document.getElementById("canvas-wrapper");

  // baseHistory: flat list of strokes/stamps received from server (non-undoable)
  // undoStack:   array of actions added this session (undoable)
  //   each action: {type:"gesture", segments:[...stroke objects]}
  //             or {type:"stamp", data, x, y, w, h}
  let baseHistory = [];
  const undoStack = [];
  let currentGesture = null;
  let _dashOffset = 0;  // tracks dash pattern continuity across segments
  const imageCache = {};  // data URL → HTMLImageElement

  function flatHistory() {
    const result = [...baseHistory];
    for (const action of undoStack) {
      if (action.type === "gesture") {
        for (const seg of action.segments) result.push(seg);
      } else if (action.type === "stamp") {
        result.push(action);
      }
    }
    return result;
  }

  function replayStamp(s) {
    const draw = (img) => {
      ctx.save();
      ctx.translate(s.x * canvas.width, s.y * canvas.height);
      if (s.r) ctx.rotate(s.r);
      ctx.drawImage(img, -s.w * canvas.width / 2, -s.h * canvas.height / 2, s.w * canvas.width, s.h * canvas.height);
      ctx.restore();
    };
    if (imageCache[s.data]) {
      draw(imageCache[s.data]);
    } else {
      const img = new Image();
      img.onload = () => { imageCache[s.data] = img; draw(img); };
      img.src = s.data;
    }
  }

  function replayHistory() {
    _dashOffset = 0;
    for (const s of flatHistory()) {
      if (s.type === "stroke") {
        drawSegment(
          s.x0 * canvas.width,  s.y0 * canvas.height,
          s.x1 * canvas.width,  s.y1 * canvas.height,
          s.color, s.size >= 1 ? s.size : s.size * canvas.width,
          s.mode
        );
      } else if (s.type === "stamp") {
        replayStamp(s);
      }
    }
  }

  function resizeCanvas() {
    const rect = wrapper.getBoundingClientRect();
    canvas.width = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
    replayHistory();
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // ── State ──
  let currentColor = COLORS[0];
  let isErasing = false;
  let brushSize = 6;
  let brushMode = "solid";
  let drawing = false;
  let prevX = 0, prevY = 0;

  // ── Build swatches ──
  const swatchesEl = document.getElementById("swatches");
  COLORS.forEach((color) => {
    const el = document.createElement("div");
    el.className = "swatch" + (color === currentColor ? " active" : "");
    el.style.background = color;
    if (color === "#ffffff") el.style.border = "2px solid #555";
    el.addEventListener("click", () => {
      currentColor = color;
      isErasing = false;
      eraserBtn.classList.remove("active");
      document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
    });
    swatchesEl.appendChild(el);
  });

  // ── Brush size ──
  const brushSlider = document.getElementById("brush-size");
  brushSlider.addEventListener("input", () => { brushSize = parseInt(brushSlider.value); });

  // ── Eraser ──
  const eraserBtn = document.getElementById("eraser-btn");
  eraserBtn.addEventListener("click", () => {
    isErasing = !isErasing;
    eraserBtn.classList.toggle("active", isErasing);
    if (isErasing) {
      document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
    }
  });

  // ── Undo ──
  const undoBtn = document.getElementById("undo-btn");

  function updateUndoBtn() {
    undoBtn.classList.toggle("enabled", undoStack.length > 0);
  }

  function performUndo() {
    if (undoStack.length === 0) return;
    undoStack.pop();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    replayHistory();
    send({ type: "redraw", history: flatHistory() });
    updateUndoBtn();
  }

  undoBtn.addEventListener("click", performUndo);

  // ── Clear ──
  document.getElementById("clear-btn").addEventListener("click", () => {
    baseHistory = [];
    undoStack.length = 0;
    updateUndoBtn();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const duration = Math.round((Date.now() - sessionStart) / 1000);
    send({ type: "clear", name: "Anonymous", duration });
  });

  // ── Drawing helpers ──
  function getColor() {
    return isErasing ? "#ffffff" : currentColor;
  }

  function drawSegment(x0, y0, x1, y1, color, size, mode) {
    const segLen = Math.hypot(x1 - x0, y1 - y0);
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (mode === "dotted") {
      const period = size * 2.5;
      ctx.setLineDash([0, period]);
      ctx.lineDashOffset = -_dashOffset;
      _dashOffset = (_dashOffset + segLen) % period;
    } else if (mode === "dashed") {
      const period = size * 4 + size * 2;
      ctx.setLineDash([size * 4, size * 2]);
      ctx.lineDashOffset = -_dashOffset;
      _dashOffset = (_dashOffset + segLen) % period;
    } else {
      ctx.setLineDash([]);
      _dashOffset = 0;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  const stampOverlay  = document.getElementById("stamp-overlay");
  const stampControls = document.getElementById("stamp-controls");
  const toolbar       = document.getElementById("toolbar");

  function startDraw(x, y) {
    if (stampOverlay.classList.contains("active")) return;
    drawing = true;
    prevX = x; prevY = y;
    currentGesture = { type: "gesture", segments: [] };
  }

  function moveDraw(x, y) {
    if (!drawing) return;
    const color = getColor();
    const size = brushSize;
    const mode = isErasing ? "solid" : brushMode;
    const stroke = {
      type: "stroke", color, size: size / canvas.width, mode,
      x0: prevX / canvas.width,  y0: prevY / canvas.height,
      x1: x    / canvas.width,   y1: y    / canvas.height,
    };
    drawSegment(prevX, prevY, x, y, color, size, mode);
    currentGesture.segments.push(stroke);
    send(stroke);
    prevX = x; prevY = y;
  }

  function endDraw() {
    if (!drawing) return;
    drawing = false;
    _dashOffset = 0;
    if (currentGesture && currentGesture.segments.length > 0) {
      undoStack.push(currentGesture);
      updateUndoBtn();
    }
    currentGesture = null;
  }

  // ── Mouse events ──
  canvas.addEventListener("mousedown", e => startDraw(e.offsetX, e.offsetY));
  canvas.addEventListener("mousemove", e => moveDraw(e.offsetX, e.offsetY));
  canvas.addEventListener("mouseup", endDraw);
  canvas.addEventListener("mouseleave", endDraw);

  // ── Touch events ──
  function touchCoords(touch) {
    const rect = canvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const { x, y } = touchCoords(e.touches[0]);
    startDraw(x, y);
  }, { passive: false });

  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    const { x, y } = touchCoords(e.touches[0]);
    moveDraw(x, y);
  }, { passive: false });

  canvas.addEventListener("touchend", e => { e.preventDefault(); endDraw(); }, { passive: false });
  canvas.addEventListener("touchcancel", e => { e.preventDefault(); endDraw(); }, { passive: false });

  // ── WebSocket ──
  const WS_URL = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?role=draw`;
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = e => handleServerMessage(JSON.parse(e.data));
    ws.onclose = () => setTimeout(connect, 2000);
  }

  function handleServerMessage(msg) {
    if (msg.type === "sync" && msg.history && msg.history.length > 0) {
      baseHistory = msg.history;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      replayHistory();
      document.getElementById("keeperase-overlay").classList.add("visible");
    }
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  connect();

  // ── Keep / Erase popup ──
  document.getElementById("keep-btn").addEventListener("click", () => {
    document.getElementById("keeperase-overlay").classList.remove("visible");
  });

  document.getElementById("erase-btn").addEventListener("click", () => {
    baseHistory = [];
    undoStack.length = 0;
    updateUndoBtn();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    send({ type: "redraw", history: [] });
    document.getElementById("keeperase-overlay").classList.remove("visible");
  });

  // ── DONE / sign modal ──
  const sessionStart = Date.now();
  const signOverlay = document.getElementById("sign-overlay");
  const nameInput   = document.getElementById("name-input");

  document.getElementById("done-btn").addEventListener("click", () => {
    nameInput.value = "";
    signOverlay.classList.add("visible");
    setTimeout(() => nameInput.focus(), 50);
  });

  document.getElementById("cancel-btn").addEventListener("click", () => {
    signOverlay.classList.remove("visible");
  });

  function submitDoodle() {
    const name = nameInput.value.trim() || "Anonymous";
    const duration = Math.round((Date.now() - sessionStart) / 1000);
    // Promote everything to baseHistory so it persists as non-undoable
    baseHistory = flatHistory();
    undoStack.length = 0;
    updateUndoBtn();
    send({ type: "finish", name, duration });
    signOverlay.classList.remove("visible");
    window.location.href = "/";
  }

  document.getElementById("submit-btn").addEventListener("click", submitDoodle);

  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") submitDoodle();
    if (e.key === "Escape") signOverlay.classList.remove("visible");
  });

  // ── Image Stamp ──
  const stampInput = document.getElementById("stamp-input");
  const stampBtn   = document.getElementById("stamp-btn");
  const stampImg   = document.getElementById("stamp-img");
  const stampBox   = document.getElementById("stamp-box");

  let stampData = null;
  let stampCX = 0, stampCY = 0, stampW = 0, stampH = 0, stampR = 0;
  let _activeOp = null;

  stampBtn.addEventListener("click", () => stampInput.click());

  stampInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    stampInput.value = "";
    compressImage(file, 600, 0.75, (dataUrl, aspectRatio) => {
      stampData = dataUrl;
      stampImg.src = dataUrl;
      const cw = canvas.offsetWidth;
      const ch = canvas.offsetHeight;
      stampW = cw * 0.4;
      stampH = stampW / aspectRatio;
      stampCX = cw / 2;
      stampCY = ch / 2;
      stampR = 0;
      updateStampPos();
      stampOverlay.classList.add("active");
      stampControls.style.display = "flex";
      toolbar.classList.add("stamp-mode");
    });
  });

  function compressImage(file, maxPx, quality, callback) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const off = document.createElement("canvas");
        off.width = w; off.height = h;
        off.getContext("2d").drawImage(img, 0, 0, w, h);
        callback(off.toDataURL("image/jpeg", quality), img.width / img.height);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function updateStampPos() {
    stampBox.style.left      = (stampCX - stampW / 2) + "px";
    stampBox.style.top       = (stampCY - stampH / 2) + "px";
    stampBox.style.width     = stampW + "px";
    stampBox.style.height    = stampH + "px";
    stampBox.style.transform = `rotate(${stampR}rad)`;
  }

  // ── Stamp interactions (move / scale / rotate) ──
  stampOverlay.addEventListener("pointerdown", e => {
    if (e.target.tagName === "BUTTON") return;
    e.preventDefault();
    stampOverlay.setPointerCapture(e.pointerId);
    const rect = stampOverlay.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;

    if (e.target.id === "s-rot") {
      const startAngle = Math.atan2(py - stampCY, px - stampCX);
      _activeOp = { type: "rotate", startR: stampR, startAngle, cx: stampCX, cy: stampCY };
    } else if (e.target.classList.contains("s-handle")) {
      _activeOp = { type: "scale", cx: stampCX, cy: stampCY, startW: stampW, startH: stampH };
    } else if (e.target === stampBox) {
      _activeOp = { type: "move", startCX: stampCX, startCY: stampCY, startPX: px, startPY: py };
    }
  });

  stampOverlay.addEventListener("pointermove", e => {
    if (!_activeOp) return;
    e.preventDefault();
    const rect = stampOverlay.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;

    if (_activeOp.type === "move") {
      stampCX = _activeOp.startCX + (px - _activeOp.startPX);
      stampCY = _activeOp.startCY + (py - _activeOp.startPY);
    } else if (_activeOp.type === "scale") {
      const origDist = Math.hypot(_activeOp.startW, _activeOp.startH) / 2;
      const newDist  = Math.hypot(px - _activeOp.cx, py - _activeOp.cy);
      const scale    = newDist / origDist;
      stampW = Math.max(20, _activeOp.startW * scale);
      stampH = Math.max(20, _activeOp.startH * scale);
    } else if (_activeOp.type === "rotate") {
      const angle = Math.atan2(py - _activeOp.cy, px - _activeOp.cx);
      stampR = _activeOp.startR + (angle - _activeOp.startAngle);
    }
    updateStampPos();
  });

  stampOverlay.addEventListener("pointerup",     () => { _activeOp = null; });
  stampOverlay.addEventListener("pointercancel", () => { _activeOp = null; });

  document.getElementById("discard-stamp-btn").addEventListener("click", () => {
    stampOverlay.classList.remove("active");
    stampControls.style.display = "none";
    toolbar.classList.remove("stamp-mode");
    stampData = null;
  });

  document.getElementById("place-stamp-btn").addEventListener("click", () => {
    if (!stampData) return;
    const displayW = canvas.offsetWidth;
    const displayH = canvas.offsetHeight;
    const nx = stampCX / displayW;
    const ny = stampCY / displayH;
    const nw = stampW / displayW;
    const nh = stampH / displayH;
    const msg = { type: "stamp", data: stampData, x: nx, y: ny, w: nw, h: nh, r: stampR };

    const doDraw = (img) => {
      imageCache[msg.data] = img;
      const scaleX = canvas.width / displayW;
      const scaleY = canvas.height / displayH;
      ctx.save();
      ctx.translate(stampCX * scaleX, stampCY * scaleY);
      ctx.rotate(stampR);
      ctx.drawImage(img, -(stampW * scaleX) / 2, -(stampH * scaleY) / 2, stampW * scaleX, stampH * scaleY);
      ctx.restore();
      undoStack.push(msg);
      updateUndoBtn();
      send(msg);
    };

    if (imageCache[stampData]) {
      doDraw(imageCache[stampData]);
    } else {
      const img = new Image();
      img.onload = () => doDraw(img);
      img.src = stampData;
    }

    stampOverlay.classList.remove("active");
    stampControls.style.display = "none";
    toolbar.classList.remove("stamp-mode");
    stampData = null;
  });

  // ── Shape picker ──
  const shapeToggleBtn = document.getElementById("shape-toggle-btn");
  const shapePicker    = document.getElementById("shape-picker");
  const brushToggleBtn = document.getElementById("brush-toggle-btn");
  const brushPicker    = document.getElementById("brush-picker");

  shapeToggleBtn.addEventListener("click", () => {
    brushPicker.classList.remove("open");
    brushToggleBtn.classList.remove("open");
    shapePicker.classList.toggle("open");
    shapeToggleBtn.classList.toggle("open", shapePicker.classList.contains("open"));
  });

  // ── Brush picker ──
  brushToggleBtn.addEventListener("click", () => {
    shapePicker.classList.remove("open");
    shapeToggleBtn.classList.remove("open");
    brushPicker.classList.toggle("open");
    brushToggleBtn.classList.toggle("open", brushPicker.classList.contains("open"));
  });

  document.querySelectorAll(".brush-mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      brushMode = btn.dataset.mode;
      document.querySelectorAll(".brush-mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });

  function renderShape(type, color) {
    const SIZE = 400, PAD = 30, mid = SIZE / 2, r = (SIZE - PAD * 2) / 2;
    const off = document.createElement("canvas");
    off.width = off.height = SIZE;
    const c = off.getContext("2d");
    c.fillStyle = color;
    c.beginPath();
    if (type === "circle") {
      c.arc(mid, mid, r, 0, Math.PI * 2);
    } else if (type === "square") {
      c.rect(PAD, PAD, SIZE - PAD * 2, SIZE - PAD * 2);
    } else if (type === "triangle") {
      c.moveTo(mid, PAD); c.lineTo(SIZE - PAD, SIZE - PAD); c.lineTo(PAD, SIZE - PAD); c.closePath();
    } else if (type === "star") {
      const inner = r * 0.4;
      for (let i = 0; i < 10; i++) {
        const a = (i * Math.PI / 5) - Math.PI / 2;
        const rr = i % 2 === 0 ? r : inner;
        i === 0 ? c.moveTo(mid + rr * Math.cos(a), mid + rr * Math.sin(a))
                : c.lineTo(mid + rr * Math.cos(a), mid + rr * Math.sin(a));
      }
      c.closePath();
    } else if (type === "diamond") {
      c.moveTo(mid, PAD); c.lineTo(SIZE - PAD, mid); c.lineTo(mid, SIZE - PAD); c.lineTo(PAD, mid); c.closePath();
    } else if (type === "hexagon") {
      for (let i = 0; i < 6; i++) {
        const a = (i * Math.PI / 3) - Math.PI / 6;
        i === 0 ? c.moveTo(mid + r * Math.cos(a), mid + r * Math.sin(a))
                : c.lineTo(mid + r * Math.cos(a), mid + r * Math.sin(a));
      }
      c.closePath();
    }
    c.fill();
    return off.toDataURL("image/png");
  }

  document.querySelectorAll(".shape-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const dataUrl = renderShape(btn.dataset.shape, currentColor);
      stampData = dataUrl;
      stampImg.src = dataUrl;
      const cw = canvas.offsetWidth, ch = canvas.offsetHeight;
      const sz = cw * 0.3;
      stampW = sz; stampH = sz;
      stampCX = cw / 2; stampCY = ch / 2;
      stampR = 0;
      updateStampPos();
      stampOverlay.classList.add("active");
      stampControls.style.display = "flex";
      toolbar.classList.add("stamp-mode");
      shapePicker.classList.remove("open");
      shapeToggleBtn.classList.remove("open");
      brushPicker.classList.remove("open");
      brushToggleBtn.classList.remove("open");
    });
  });

  // ── Session timer (5 minutes) ──
  const SESSION_MS = 5 * 60 * 1000;
  const deadline = Date.now() + SESSION_MS;
  const timerEl = document.getElementById("timer");

  function updateTimer() {
    const remaining = Math.max(0, deadline - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
    if (remaining <= 30000) timerEl.classList.add("urgent");
    if (remaining === 0) window.location.href = "/";
  }

  updateTimer();
  setInterval(updateTimer, 1000);
</script>
</body>
</html>
